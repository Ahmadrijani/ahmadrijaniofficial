<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title></title>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#1b1b1b;
      --bg2:#242424;
      --panel:#202020;
      --panel2:#2a2a2a;
      --line:#000000;
      --line2:#1a1a1a;
      --text:#f3f3f3;
      --muted:#c1c1c1;
      --muted2:#8e8e8e;
      --shadow:0 10px 22px rgba(0,0,0,.42);
      --radius:5px;
      --radius-soft:8px;
      --accent1:#ffffff;
      --accent2:#bdbdbd;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      font-family:"Poppins", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.06), rgba(255,255,255,0) 36%),
        linear-gradient(180deg, #161616 0%, #0c0c0c 100%);
      overflow-x:hidden;
      font-weight:700;
    }

    body{
      overflow-y:scroll;
    }

    a, span{
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
    }

    img{
      vertical-align:middle;
    }

    a:hover{
      cursor:url("../images/cursors/link.cur"), auto;
    }

    .aero-window{
      width:100vw;
      min-height:100vh;
      position:relative;
      overflow:hidden;
      background:rgba(18,18,18,.88);
      border:1px solid rgba(0,0,0,.9);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        2px 2px 12px rgba(0,0,0,.48);
      border-radius:0;
    }

    .aero-window::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:-1;
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,0) 28%),
        linear-gradient(135deg, rgba(255,255,255,.05), transparent 35%),
        linear-gradient(225deg, rgba(255,255,255,.03), transparent 35%),
        linear-gradient(180deg, #202020, #151515);
    }

    .aero-title-bar{
      padding:6px;
      padding-top:0;
      min-height:16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12) 70px, transparent 100px),
        linear-gradient(225deg, rgba(255,255,255,.12) 70px, transparent 100px),
        linear-gradient(180deg, rgba(52,52,52,.92), rgba(24,24,24,.98));
      border-bottom:1px solid rgba(0,0,0,.9);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 1px 0 0 rgba(255,255,255,.08),
        inset -1px 0 0 rgba(255,255,255,.08);
    }

    .aero-window-body{
      margin:6px;
      margin-top:0;
      padding:12px;
      min-height:calc(100vh - 12px);
      border:1px solid rgba(0,0,0,.9);
      background:linear-gradient(180deg, rgba(31,31,31,.98), rgba(20,20,20,.98));
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .controls{
      display:grid;
      grid-template-columns:minmax(220px, 1.2fr) auto minmax(200px, .85fr);
      gap:10px;
      align-items:center;
      margin-bottom:12px;
    }

    .controls.search-active{
      grid-template-columns:minmax(260px, 1.8fr) auto minmax(70px, .25fr);
    }

    .searchbox,
    .centerbox,
    .sortwrap{
      position:relative;
      transition:transform .28s ease, opacity .28s ease, width .28s ease, max-width .28s ease;
    }

    .searchbox{
      width:min(100%, 280px);
      justify-self:start;
      transition:width .28s ease;
    }

    .searchbox.expanded{
      width:100%;
    }

    .searchbox i,
    .sortwrap i{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      left:12px;
      color:var(--muted2);
      pointer-events:none;
      font-size:13px;
      z-index:2;
    }

    input,button{
      font-family:"Poppins", sans-serif;
      font-weight:700;
    }

    input{
      width:100%;
      border:1px solid var(--line);
      background:linear-gradient(180deg, #353535 0%, #202020 50%, #161616 100%);
      color:var(--text);
      outline:none;
      border-radius:var(--radius);
      padding:12px 12px 12px 36px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 1px 0 rgba(0,0,0,.18);
      transition:all .24s ease;
    }

    input::placeholder{
      color:#b6b6b6;
      font-weight:700;
    }

    input:focus{
      border-color:#000;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.1),
        0 0 0 2px rgba(255,255,255,.04);
    }

    .ui-button,
    .categorybtn,
    .sortbtn,
    .tagchip,
    .tagitem,
    .yt-btn,
    .closebtn{
      border:1px solid rgb(15, 15, 15);
      border-radius:5px;
      color:rgb(238, 238, 238);
      background: linear-gradient(rgba(255, 255, 255, 0.25) 0px, rgba(117, 117, 117, 0.15) 20%, rgba(92, 92, 92, 0.15) 60%, rgba(0, 0, 0, 0.3) 60%, rgba(41, 41, 41, 0.3) 100%);
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
      box-shadow:0 2px 4px rgba(0,0,0,.2);
    }

    .categorybtn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:11px 16px;
      cursor:pointer;
      white-space:nowrap;
      max-width:100%;
      overflow:hidden;
      position:relative;
      transition:all .24s ease;
      justify-content:center;
    }

    .categorybtn::before,
    .sortbtn::before,
    .tagchip::before,
    .tagitem::before,
    .yt-btn::before{
      background: linear-gradient(rgba(117, 117, 117, 0.7) 0px, rgba(255, 255, 255, 0.1) 100%);
      border-radius: 20px;
      position: absolute;
      content: "";
      height: 11px;
      width: 90%;
      top: 0px;
      left: 5%;
      opacity: 0.3;
      pointer-events:none;
    }

    .categorybtn:hover,
    .sortbtn:hover,
    .tagchip:hover,
    .tagitem:hover,
    .yt-btn:hover,
    .closebtn:hover{
      transform:scale(1.03);
      cursor:url("../images/cursors/link.cur"), auto;
    }

    .categorybtn .btn-text,
    .sortbtn .btn-text{
      display:inline-block;
      max-width:180px;
      overflow:hidden;
      white-space:nowrap;
      opacity:1;
      transform:translateX(0);
      transition:opacity .2s ease, max-width .28s ease, transform .28s ease;
    }

    .categorybtn.compact,
    .sortbtn.compact{
      padding:11px 12px;
      min-width:46px;
      justify-content:center;
    }

    .categorybtn.compact .btn-text,
    .sortbtn.compact .btn-text{
      max-width:0;
      opacity:0;
      transform:translateX(8px);
    }

    .sortwrap{
      justify-self:end;
      width:100%;
      max-width:280px;
      overflow:hidden;
    }

    .sortbtn{
      width:100%;
      padding:12px 12px 12px 36px;
      cursor:pointer;
      text-align:left;
      position:relative;
      transition:all .24s ease;
      overflow:hidden;
      background: linear-gradient(rgba(255, 255, 255, 0.25) 0px, rgba(117, 117, 117, 0.15) 20%, rgba(92, 92, 92, 0.15) 60%, rgba(0, 0, 0, 0.3) 60%, rgba(41, 41, 41, 0.3) 100%);
    }

    .sortbtn::after{
      content:"\f107";
      font-family:"Font Awesome 6 Free";
      font-weight:900;
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      color:var(--muted);
      pointer-events:none;
      font-size:12px;
      transition:opacity .2s ease;
    }

    .sortbtn.compact::after{ opacity:0; }

    .tag-row-wrap{
      margin:8px 0 14px;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:nowrap;
    }

    .tag-scroll{
      flex:1;
      overflow-x:auto;
      overflow-y:hidden;
      display:flex;
      gap:8px;
      padding-bottom:8px;
      scrollbar-width:thin;
      scrollbar-color:rgba(117,117,117,.8) rgba(0,0,0,.3);
      scroll-snap-type:x proximity;
    }

    .tag-scroll::-webkit-scrollbar{ height:10px; }
    .tag-scroll::-webkit-scrollbar-track{ background:rgba(0,0,0,.3); border-radius:999px; }
    .tag-scroll::-webkit-scrollbar-thumb{ background:rgba(117,117,117,.8); border-radius:999px; }

    .tagchip{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:9px 12px;
      cursor:pointer;
      transition:all 240ms ease;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
      position:relative;
      scroll-snap-align:start;
      background: linear-gradient(rgba(255, 255, 255, 0.25) 0px, rgba(117, 117, 117, 0.15) 20%, rgba(92, 92, 92, 0.15) 60%, rgba(0, 0, 0, 0.3) 60%, rgba(41, 41, 41, 0.3) 100%);
    }

    .tagchip.active,
    .tagitem.active,
    .navbar-titles{
      background: linear-gradient(rgb(255, 255, 255) 0px, rgba(129, 129, 129, 0.75) 3%, rgba(56, 56, 56, 0.75) 50%, rgba(27, 27, 27, 0.75) 50%);
      border: 1px solid rgb(0, 0, 0);
      border-radius: 3px;
      color: rgb(247, 244, 244);
      padding-bottom: 1px;
      margin: 1px 1px 2px;
      font-size: 13.6px;
      font-weight: 700;
      text-align: center;
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
    }

    .tagchip.active,
    .tagitem.active{
      border-radius:3px;
    }

    .meta-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:6px 2px 14px;
      color:var(--muted);
      font-size:13px;
      flex-wrap:wrap;
      font-weight:700;
    }

    .grid{
      display:grid;
      gap:12px;
    }

    .post-link{
      display:block;
      color:inherit;
      text-decoration:none;
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
    }

    .card{
      display:grid;
      grid-template-columns:clamp(110px, 24vw, 160px) 1fr;
      gap:12px;
      background:linear-gradient(180deg, rgba(34,34,34,.98), rgba(22,22,22,.98));
      border:1px solid rgba(0,0,0,.95);
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,.26);
      min-height:140px;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease;
    }

    .card:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.3);
    }

    .thumb{
      width:100%;
      height:100%;
      min-height:140px;
      max-height:220px;
      object-fit:cover;
      background:#2b2b2b;
      display:block;
    }

    .content{
      padding:14px 14px 12px 0;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:10px;
    }

    .title{
      font-size:16px;
      line-height:1.25;
      margin:0 0 6px;
      font-weight:800;
      color:#f6f6f6;
    }

    .desc{
      color:#d0d0d0;
      font-size:13px;
      line-height:1.5;
      margin:0;
      font-weight:700;
    }

    .postmeta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      color:#e4e4e4;
      font-size:12px;
      font-weight:700;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid rgb(15,15,15);
      background:linear-gradient(rgba(255, 255, 255, 0.25) 0px, rgba(117, 117, 117, 0.15) 20%, rgba(92, 92, 92, 0.15) 60%, rgba(0, 0, 0, 0.3) 60%, rgba(41, 41, 41, 0.3) 100%);
      padding:6px 10px;
      border-radius:5px;
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
    }

    .empty,.endmsg{
      text-align:center;
      padding:18px 10px;
      color:#d0d0d0;
      font-weight:700;
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
    }

    .endmsg{
      display:none;
      margin-top:8px;
    }

    .tagmodal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.68);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:100;
      padding:16px;
      backdrop-filter:blur(3px);
    }

    .tagmodal.show{ display:flex; }

    .tagmodal-box{
      width:min(720px, 100%);
      background:linear-gradient(180deg, rgba(27,27,27,.98), rgba(17,17,17,.98));
      border:1px solid rgba(0,0,0,.95);
      border-radius:10px;
      box-shadow:0 24px 60px rgba(0,0,0,.56);
      overflow:hidden;
    }

    .tagmodal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 16px 12px;
      border-bottom:1px dashed rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }

    .tagmodal-head h2{
      margin:0;
      font-size:16px;
      font-weight:800;
      color:var(--text);
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
    }

    .closebtn{
      width:40px;
      height:40px;
      cursor:pointer;
      box-shadow:0 2px 4px rgba(0,0,0,.08);
      position:relative;
      transition:all .24s ease;
    }

    .taglist{
      padding:16px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      max-height:60vh;
      overflow:auto;
    }

    .tagitem{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      cursor:pointer;
      transition:all 240ms ease;
      user-select:none;
      position:relative;
      font-weight:700;
      background: linear-gradient(rgba(255, 255, 255, 0.25) 0px, rgba(117, 117, 117, 0.15) 20%, rgba(92, 92, 92, 0.15) 60%, rgba(0, 0, 0, 0.3) 60%, rgba(41, 41, 41, 0.3) 100%);
    }

    .selectedtagline{
      margin-top:12px;
      color:#d0d0d0;
      font-size:13px;
      font-weight:700;
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
    }

    .selectedtagname{
      color:#fff;
      font-weight:800;
    }

    .yt-footer{
      margin-top:34px;
      padding:20px 0 0;
      text-align:center;
      border-top:1px dashed rgba(255,255,255,.10);
    }

    .footer-filter{
      margin-top:16px;
      display:none;
      justify-content:center;
    }

    .footer-filter.show{ display:flex; }

    .yt-btn{
      display:inline-flex;
      align-items:center;
      gap:12px;
      padding:11px 18px;
      border-radius:5px;
      color:#f4f4f4;
      text-decoration:none;
      font-weight:700;
      font-size:13px;
      line-height:1;
      transition:all 300ms ease;
      cursor:pointer;
      min-height:42px;
      box-shadow:0 4px 4px rgba(0,0,0,.16);
      position:relative;
      user-select:none;
      -webkit-user-select:none;
      border:1px solid rgb(15, 15, 15);
      background: linear-gradient(rgba(255, 255, 255, 0.25) 0px, rgba(117, 117, 117, 0.15) 20%, rgba(92, 92, 92, 0.15) 60%, rgba(0, 0, 0, 0.3) 60%, rgba(41, 41, 41, 0.3) 100%);
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
    }

    .yt-btn .btn-icon{
      width:24px;
      height:24px;
      min-width:24px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.06);
      flex:0 0 auto;
      position:relative;
      z-index:1;
    }

    .yt-btn .btn-icon i{
      font-size:11px;
    }

    .yt-btn:hover,
    .yt-btn:focus,
    .categorybtn:hover,
    .sortbtn:hover,
    .tagchip:hover,
    .tagitem:hover,
    .closebtn:hover{
      box-shadow:0 6px 8px rgba(0,0,0,.2);
      transform:translateY(-1px) scale(1.03);
    }

    .readmore-wrap{
      margin-top:8px;
      display:flex;
      justify-content:flex-start;
    }

    .readmore{
      display:inline-flex;
      width:auto;
      padding:9px 14px;
      min-height:38px;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:12.5px;
    }

    .skeleton-grid{
      display:grid;
      gap:12px;
    }

    .skeleton-card{
      display:grid;
      grid-template-columns:clamp(110px, 24vw, 160px) 1fr;
      gap:12px;
      min-height:140px;
      border-radius:8px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,.95);
      background:linear-gradient(180deg, rgba(34,34,34,.98), rgba(22,22,22,.98));
      box-shadow:0 8px 20px rgba(0,0,0,.22);
    }

    .skeleton-thumb,
    .skeleton-line,
    .skeleton-chip,
    .skeleton-chip-sm{
      position:relative;
      overflow:hidden;
      background:linear-gradient(180deg, #2a2a2a, #1f1f1f);
    }

    .skeleton-thumb::after,
    .skeleton-line::after,
    .skeleton-chip::after,
    .skeleton-chip-sm::after{
      content:"";
      position:absolute;
      inset:0;
      transform:translateX(-100%);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      animation:skeletonShine 1.15s infinite;
    }

    .skeleton-thumb{
      min-height:140px;
      max-height:220px;
      background:linear-gradient(180deg, #2f2f2f, #1b1b1b);
    }

    .skeleton-content{
      padding:14px 14px 12px 0;
      display:flex;
      flex-direction:column;
      gap:10px;
      justify-content:space-between;
    }

    .skeleton-line{
      border-radius:4px;
      height:14px;
    }

    .skeleton-line.title{ width:min(92%, 320px); height:20px; }
    .skeleton-line.desc1{ width:95%; }
    .skeleton-line.desc2{ width:82%; }
    .skeleton-line.desc3{ width:70%; }

    .skeleton-meta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .skeleton-chip,
    .skeleton-chip-sm{
      border-radius:5px;
      height:28px;
    }

    .skeleton-chip{ width:118px; }
    .skeleton-chip-sm{ width:92px; }

    .skeleton-tag-row{
      display:flex;
      gap:8px;
      overflow:hidden;
      margin-bottom:8px;
    }

    .skeleton-tag{
      width:90px;
      height:34px;
      border-radius:5px;
      background:linear-gradient(180deg, #2d2d2d, #1e1e1e);
      position:relative;
      overflow:hidden;
    }

    .skeleton-tag::after{
      content:"";
      position:absolute;
      inset:0;
      transform:translateX(-100%);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      animation:skeletonShine 1.15s infinite;
    }

    @keyframes skeletonShine{
      100%{ transform:translateX(100%); }
    }

    .skeleton-hidden{ display:none !important; }

    .header-logo-text,
    #mainHeader{
      display:flex;
      align-items:center;
    }

    #logo{
      transition-duration:0.4s;
    }

    #logo:hover{
      filter:brightness(80%);
      transition-duration:0.4s;
    }

    .header-text::after{
      color:rgb(255,255,255);
      content:"The FA Archive";
    }

    .header-title{
      color:rgb(255,255,255);
      display:block;
      font-size:30px;
      margin:-8px 0px -5px;
      font-weight:800;
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
    }

    .header-text span{
      display:none;
    }

    .header-motto{
      color:rgb(201,201,201);
      margin-left:5px;
      font-size:15px;
      font-weight:700;
    }

    .toggle-buttons-divs{
      display:none;
      align-items:center;
      justify-content:center;
      padding-right:20px;
    }

    .toggle-buttons-divs span{
      color:rgb(233,233,233);
      margin-right:8px;
    }

    #navbarToggleButton{
      cursor:url("../images/cursors/link.cur"), auto;
      margin-right:5px;
      max-width:25px;
    }

    .nav-inactive{
      border: 1px solid rgb(15, 15, 15);
      border-radius: 5px;
      color: rgb(238, 238, 238);
      display: flex;
      align-items: center;
      margin: auto auto 1px;
      width: 93%;
      font-size: 12.5px;
      position: relative;
      background: linear-gradient(rgba(255, 255, 255, 0.25) 0px, rgba(117, 117, 117, 0.15) 20%, rgba(92, 92, 92, 0.15) 60%, rgba(0, 0, 0, 0.3) 60%, rgba(41, 41, 41, 0.3) 100%);
      text-shadow: rgb(0, 0, 0) 0px 0px 3px;
      padding:8px 10px;
      transition:all .24s ease;
    }

    .nav-inactive:hover{
      background: linear-gradient(rgba(255, 255, 255, 0.25) 0px, rgba(117, 117, 117, 0.2) 20%, rgba(92, 92, 92, 0.2) 50%, rgba(43, 43, 43, 0.3) 50%, rgba(161, 161, 161, 0.3) 100%);
      transform: scale(1.03);
    }

    .nav-inactive::before{
      background: linear-gradient(rgba(117, 117, 117, 0.7) 0px, rgba(255, 255, 255, 0.1) 100%);
      border-radius: 20px;
      position: absolute;
      content: "";
      height: 11px;
      width: 90%;
      top: 0px;
      left: 5%;
      opacity: 0.3;
      pointer-events:none;
    }

    .nav-icons{
      height:21px;
      margin:1px 4px;
      z-index:1;
    }

    @media (max-width:920px){
      .controls{
        grid-template-columns:1fr;
        gap:8px;
      }

      .searchbox{
        width:100%;
        max-width:none;
      }

      .controls.search-active{
        grid-template-columns:1fr;
      }

      .centerbox,
      .sortwrap{
        width:100%;
        max-width:none;
        justify-self:stretch;
      }

      .categorybtn,
      .sortbtn{
        width:100%;
      }

      .categorybtn.compact,
      .sortbtn.compact{
        width:100%;
        min-width:0;
      }

      .categorybtn.compact .btn-text,
      .sortbtn.compact .btn-text{
        max-width:180px;
        opacity:1;
        transform:none;
      }

      .tag-row-wrap{
        flex-wrap:wrap;
      }

      .tag-scroll{
        width:100%;
        order:1;
      }

      .card,
      .skeleton-card{
        grid-template-columns:1fr;
      }

      .thumb,
      .skeleton-thumb{
        min-height:160px;
        max-height:220px;
      }

      .content,
      .skeleton-content{
        padding:0 14px 14px;
      }

      .yt-btn{
        width:100%;
      }
    }

    @media (max-width:520px){
      .thumb,
      .skeleton-thumb{
        min-height:140px;
        max-height:180px;
      }
    }
  </style>
</head>
<body>
  <div class="aero-window">
    <div class="aero-title-bar"></div>
    <div class="aero-window-body">
      <div class="controls" id="controlsBar">
        <div class="searchbox" id="searchBox">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="searchInput" type="text" placeholder="Cari postingan..." autocomplete="off">
        </div>

        <div class="centerbox">
          <button class="categorybtn" type="button" id="openAllTagsBtn" aria-label="Lihat semua kategori">
            <i class="fa-solid fa-list"></i>
            <span class="btn-text">Lihat semua kategori</span>
          </button>
        </div>

        <div class="sortwrap">
          <i class="fa-solid fa-arrow-down-wide-short"></i>
          <button id="sortBtn" class="sortbtn" type="button">
            <span class="btn-text">Urut: Terbaru</span>
          </button>
        </div>
      </div>

      <div class="tag-row-wrap">
        <div class="tag-scroll" id="tagPreview"></div>
      </div>

      <div class="meta-row">
        <div id="statusText">Memuat data...</div>
        <div id="countText"></div>
      </div>

      <div id="news"></div>

      <div class="endmsg" id="endMsg">
        <i class="fa-solid fa-box-open"></i> Kamu sudah sampai akhir postingan
      </div>

      <div class="yt-footer">
        <div class="footer-filter" id="footerFilterWrap">
          <button class="yt-btn" id="clearFilterBtn" type="button">
            <span class="btn-icon"><i class="fa-solid fa-filter-circle-xmark"></i></span>
            Matikan filter
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="tagmodal" id="tagModal" aria-hidden="true">
    <div class="tagmodal-box" role="dialog" aria-modal="true">
      <div class="tagmodal-head">
        <h2>Kategori lainnya</h2>
        <button class="closebtn" id="closeTagModal" type="button" aria-label="Tutup">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="taglist" id="tagList"></div>
      <div class="selectedtagline" style="padding:0 16px 16px;">
        Filter aktif: <span class="selectedtagname" id="selectedTagText">Semua</span>
      </div>
    </div>
  </div>

  <script>
    const BLOG = "https://ahmadrijaniofficial.blogspot.com/feeds/posts/default?alt=json-in-script&max-results=500&callback=handleFeed";
    const STEP = 6;

    let allPosts = [];
    let filteredPosts = [];
    let visibleStart = 0;
    let visibleCount = STEP;
    let activeTag = "all";
    let activeSort = "newest";
    let searchQuery = "";
    let loading = false;
    let endReached = false;
    let feedLoaded = false;

    const els = {
      controlsBar: document.getElementById("controlsBar"),
      searchBox: document.getElementById("searchBox"),
      searchInput: document.getElementById("searchInput"),
      sortBtn: document.getElementById("sortBtn"),
      news: document.getElementById("news"),
      endMsg: document.getElementById("endMsg"),
      statusText: document.getElementById("statusText"),
      countText: document.getElementById("countText"),
      tagModal: document.getElementById("tagModal"),
      tagList: document.getElementById("tagList"),
      openAllTagsBtn: document.getElementById("openAllTagsBtn"),
      closeTagModal: document.getElementById("closeTagModal"),
      clearFilterBtn: document.getElementById("clearFilterBtn"),
      footerFilterWrap: document.getElementById("footerFilterWrap"),
      selectedTagText: document.getElementById("selectedTagText"),
      tagPreview: document.getElementById("tagPreview"),
      categoryBtn: document.querySelector(".categorybtn"),
      sortBtnInner: document.querySelector("#sortBtn .btn-text"),
      categoryBtnInner: document.querySelector(".categorybtn .btn-text"),
    };

    function escapeHtml(str){
      return String(str || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function getTextFromHtml(html){
      const temp = document.createElement("div");
      temp.innerHTML = html || "";
      return (temp.textContent || temp.innerText || "").replace(/\s+/g, " ").trim();
    }

    function getThumb(html){
      const match = String(html || "").match(/<img[^>]+src="([^">]+)"/i);
      return match ? match[1] : "https://via.placeholder.com/800x450?text=No+Image";
    }

    function getTags(entry){
      return (entry.category || []).map(c => c.term).filter(Boolean);
    }

    function getPostLink(entry){
      let link = "#";
      (entry.link || []).forEach(l => {
        if (l.rel === "alternate") link = l.href;
      });
      return link;
    }

    function formatDate(d){
      return new Date(d).toLocaleDateString("id-ID", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function getAllTags(){
      const set = new Set();
      allPosts.forEach(p => getTags(p).forEach(t => set.add(t)));
      return Array.from(set).sort((a, b) => a.localeCompare(b, "id"));
    }

    function updateTagUI(){
      els.selectedTagText.textContent = activeTag === "all" ? "Semua" : activeTag;
      els.footerFilterWrap.classList.toggle("show", activeTag !== "all");
      renderTagPreview();
      renderTagModal();
    }

    function updateSortButton(){
      els.sortBtnInner.textContent = activeSort === "newest" ? "Urut: Terbaru" : "Urut: Terlama";
    }

    function renderTagPreview(){
      const tags = getAllTags();
      let html = "";

      html += `<button class="tagchip ${activeTag === "all" ? "active" : ""}" type="button" data-tag="all">Semua</button>`;

      tags.forEach(tag => {
        const active = activeTag === tag ? "active" : "";
        html += `<button class="tagchip ${active}" type="button" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`;
      });

      els.tagPreview.innerHTML = html;

      els.tagPreview.querySelectorAll(".tagchip").forEach(item => {
        item.addEventListener("click", () => {
          setTag(item.getAttribute("data-tag") || "all");
        });
      });
    }

    function renderTagModal(){
      const tags = getAllTags();
      let html = `
        <div class="tagitem ${activeTag === "all" ? "active" : ""}" data-tag="all">
          <i class="fa-solid fa-layer-group"></i> Semua
        </div>
      `;

      tags.forEach(tag => {
        const active = activeTag === tag ? "active" : "";
        html += `
          <div class="tagitem ${active}" data-tag="${escapeHtml(tag)}">
            ${escapeHtml(tag)}
          </div>
        `;
      });

      els.tagList.innerHTML = html;

      els.tagList.querySelectorAll(".tagitem").forEach(item => {
        item.addEventListener("click", () => {
          setTag(item.getAttribute("data-tag") || "all");
          closeTagModal();
        });
      });
    }

    function setSkeleton(count = STEP){
      let html = `<div class="skeleton-tag-row">`;
      for (let i = 0; i < 5; i++) html += `<div class="skeleton-tag"></div>`;
      html += `</div><div class="skeleton-grid">`;
      for (let i = 0; i < count; i++) {
        html += `
          <div class="skeleton-card" aria-hidden="true">
            <div class="skeleton-thumb"></div>
            <div class="skeleton-content">
              <div>
                <div class="skeleton-line title"></div>
                <div style="height:10px"></div>
                <div class="skeleton-line desc1"></div>
                <div style="height:8px"></div>
                <div class="skeleton-line desc2"></div>
                <div style="height:8px"></div>
                <div class="skeleton-line desc3"></div>
              </div>
              <div class="skeleton-meta">
                <div class="skeleton-chip"></div>
                <div class="skeleton-chip-sm"></div>
                <div class="skeleton-chip-sm"></div>
              </div>
              <div class="readmore-wrap">
                <div class="yt-btn readmore" style="pointer-events:none; opacity:.95;">
                  <span class="btn-icon"><i class="fa-solid fa-arrow-right"></i></span>
                  Memuat...
                </div>
              </div>
            </div>
          </div>
        `;
      }
      html += `</div>`;
      els.news.innerHTML = html;
    }

    function applyFilters(){
      if (!feedLoaded){
        setSkeleton(STEP);
        els.statusText.textContent = "Memuat data...";
        els.countText.textContent = "";
        return;
      }

      const q = searchQuery.toLowerCase().trim();

      filteredPosts = allPosts.filter(p => {
        const title = (p.title?.$t || "").toLowerCase();
        const text = getTextFromHtml(p.content?.$t || "").toLowerCase();
        const tags = getTags(p);

        const matchSearch = !q || title.includes(q) || text.includes(q) || tags.some(t => t.toLowerCase().includes(q));
        const matchTag = activeTag === "all" || tags.includes(activeTag);

        return matchSearch && matchTag;
      });

      sortFiltered();
      visibleStart = 0;
      visibleCount = STEP;
      endReached = false;
      els.news.innerHTML = "";
      updateMeta();
      renderMore(true);
    }

    function sortFiltered(){
      const sortMode = activeSort;
      filteredPosts.sort((a, b) => {
        const da = new Date(a.published?.$t || 0);
        const db = new Date(b.published?.$t || 0);
        return sortMode === "oldest" ? da - db : db - da;
      });
    }

    function updateMeta(){
      els.countText.textContent = `${filteredPosts.length} postingan`;
      els.statusText.textContent =
        activeTag === "all"
          ? "Menampilkan semua postingan"
          : `Filter kategori: ${activeTag}`;
    }

    function bukaLinkKeluar(url){
      try {
        if (window.top && window.top !== window.self) {
          window.top.location.href = url;
        } else {
          window.location.href = url;
        }
      } catch (e) {
        window.location.href = url;
      }
      return false;
    }

    function renderCard(post){
      const title = escapeHtml(post.title?.$t || "Tanpa judul");
      const rawHtml = post.content?.$t || post.summary?.$t || "";
      const descText = getTextFromHtml(rawHtml).substring(0, 140);
      const desc = escapeHtml(descText);
      const thumb = getThumb(rawHtml);
      const date = formatDate(post.published?.$t || new Date().toISOString());
      const link = getPostLink(post);
      const tags = getTags(post);
      const tagsToShow = tags.slice(0, 2);

      return `
        <a class="post-link" href="${link}" target="_top" rel="noopener noreferrer" aria-label="Buka ${title}" onclick="return bukaLinkKeluar(this.href);">
          <article class="card">
            <img class="thumb" src="${thumb}" alt="${title}">
            <div class="content">
              <div>
                <h2 class="title">${title}</h2>
                <p class="desc">${desc}${desc.length >= 140 ? "..." : ""}</p>
              </div>

              <div class="postmeta">
                <span class="chip"><i class="fa-regular fa-calendar"></i> ${date}</span>
                ${tagsToShow.map(t => `<span class="chip"><i class="fa-solid fa-tag"></i> ${escapeHtml(t)}</span>`).join("")}
              </div>

              <div class="readmore-wrap">
                <span class="yt-btn readmore">
                  <span class="btn-icon"><i class="fa-solid fa-arrow-right"></i></span>
                  Baca selengkapnya
                </span>
              </div>
            </div>
          </article>
        </a>
      `;
    }

    function renderMore(fromReset = false){
      if (loading) return;
      if (visibleStart >= filteredPosts.length){
        endReached = true;
        els.endMsg.style.display = "block";
        return;
      }

      loading = true;
      els.endMsg.style.display = "none";

      const end = Math.min(visibleStart + visibleCount, filteredPosts.length);
      const chunk = filteredPosts.slice(visibleStart, end).map(renderCard).join("");

      if (fromReset){
        els.news.innerHTML = chunk;
      } else {
        els.news.insertAdjacentHTML("beforeend", chunk);
      }

      visibleStart = end;
      endReached = visibleStart >= filteredPosts.length;
      loading = false;

      if (endReached){
        els.endMsg.style.display = "block";
      }
    }

    function setTag(tag){
      activeTag = tag;
      updateTagUI();
      applyFilters();
    }

    function openTagModal(){
      renderTagModal();
      els.tagModal.classList.add("show");
      els.tagModal.setAttribute("aria-hidden", "false");
    }

    function closeTagModal(){
      els.tagModal.classList.remove("show");
      els.tagModal.setAttribute("aria-hidden", "true");
    }

    function setSearchActive(active){
      els.controlsBar.classList.toggle("search-active", active);
      els.searchBox.classList.toggle("expanded", active);

      els.categoryBtn.classList.toggle("compact", active);
      els.sortBtn.classList.toggle("compact", active);

      if (active){
        els.categoryBtn.setAttribute("aria-label", "Lihat semua kategori");
        els.sortBtn.setAttribute("aria-label", activeSort === "newest" ? "Urut terbaru" : "Urut terlama");
      }
    }

    function isNearBottom(){
      return window.innerHeight + window.scrollY >= document.body.offsetHeight - 240;
    }

    window.addEventListener("scroll", () => {
      if (loading || endReached) return;
      if (isNearBottom()){
        renderMore(false);
      }
    });

    els.searchInput.addEventListener("focus", () => {
      setSearchActive(true);
    });

    els.searchInput.addEventListener("blur", () => {
      if (!els.searchInput.value.trim()){
        setSearchActive(false);
      }
    });

    els.searchInput.addEventListener("input", (e) => {
      searchQuery = e.target.value || "";
      setSearchActive(!!searchQuery.trim() || document.activeElement === els.searchInput);
      applyFilters();
    });

    els.sortBtn.addEventListener("click", () => {
      activeSort = activeSort === "newest" ? "oldest" : "newest";
      updateSortButton();
      applyFilters();
    });

    els.openAllTagsBtn.addEventListener("click", openTagModal);
    els.closeTagModal.addEventListener("click", closeTagModal);

    els.tagModal.addEventListener("click", (e) => {
      if (e.target === els.tagModal) closeTagModal();
    });

    els.clearFilterBtn.addEventListener("click", () => {
      setTag("all");
      closeTagModal();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeTagModal();
    });

    function handleFeed(data){
      try{
        allPosts = data.feed?.entry || [];
        feedLoaded = true;
        updateSortButton();
        updateTagUI();
        applyFilters();
      }catch(err){
        feedLoaded = true;
        els.statusText.textContent = "Gagal memproses feed";
        els.news.innerHTML = `<div class="empty">Data feed ada, tapi formatnya tidak bisa diproses.</div>`;
        els.endMsg.style.display = "none";
        console.error(err);
      }
    }

    window.handleFeed = handleFeed;
    window.bukaLinkKeluar = bukaLinkKeluar;

    function loadJsonp(){
      const old = document.getElementById("blogFeedScript");
      if (old) old.remove();

      setSkeleton(STEP);
      const tagsSkeleton = document.getElementById("tagPreview");
      if (tagsSkeleton) tagsSkeleton.innerHTML = `
        <div class="skeleton-tag" style="width:74px"></div>
        <div class="skeleton-tag" style="width:92px"></div>
        <div class="skeleton-tag" style="width:84px"></div>
        <div class="skeleton-tag" style="width:102px"></div>
        <div class="skeleton-tag" style="width:88px"></div>
      `;

      const s = document.createElement("script");
      s.id = "blogFeedScript";
      s.src = BLOG;
      s.onerror = function(){
        feedLoaded = true;
        els.statusText.textContent = "Gagal memuat feed";
        els.news.innerHTML = `<div class="empty">Feed gagal dibaca. Pastikan blog publik dan feed aktif.</div>`;
        els.endMsg.style.display = "none";
      };
      document.body.appendChild(s);
    }

    loadJsonp();
  </script>
</body>
</html>
