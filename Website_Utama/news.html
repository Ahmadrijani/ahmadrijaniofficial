<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title></title>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#1f2328;
      --bg2:#2a2f35;
      --glass1:rgba(255,255,255,.08);
      --glass2:rgba(255,255,255,.04);
      --line:rgba(255,255,255,.08);
      --line2:rgba(255,255,255,.16);
      --text:#e7ebef;
      --muted:#aab4bf;
      --accent:#4ba1f1;
      --accent2:#8fd0ff;
      --shadow:0 14px 32px rgba(0,0,0,.45);
      --radius:10px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      font-family:"Poppins", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.05), rgba(255,255,255,0) 38%),
        linear-gradient(180deg, #1d2025 0%, #0f1114 100%);
      overflow-x:hidden;
    }

    body{
      overflow-y:scroll;
    }

    .aero-window{
      width:100vw;
      min-height:100vh;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        2px 2px 12px 1px rgba(0,0,0,.45),
        inset 0 0 0 1px rgba(255,255,255,.04);
      position:relative;
      z-index:0;
      overflow:hidden;
      background:rgba(20,24,29,.72);
      backdrop-filter:blur(4px);
      border-radius:0;
    }

    .aero-window::before{
      content:"";
      position:absolute;
      z-index:-1;
      inset:0;
      background:
        linear-gradient(transparent 20%, rgba(255,255,255,.06) 40%, transparent 41%),
        linear-gradient(to right, rgba(255,255,255,.04), rgba(0,0,0,.22), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(30,34,40,.98), rgba(18,21,26,.99));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
      opacity:.98;
    }

    .aero-window::after{
      content:"";
      position:absolute;
      z-index:-10;
      inset:0;
      backdrop-filter:blur(4px);
    }

    .aero-title-bar{
      padding:6px;
      padding-top:0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 1px 0 0 rgba(255,255,255,.08),
        inset -1px 0 0 rgba(255,255,255,.08);
      background:
        linear-gradient(135deg, rgba(255,255,255,.08) 70px, transparent 100px),
        linear-gradient(225deg, rgba(255,255,255,.08) 70px, transparent 100px),
        linear-gradient(
          54deg,
          rgba(0,0,0,0.12) 0 4%, rgba(102,102,102,0.05) 6%, rgba(0,0,0,0.12) 8% 10%,
          rgba(0,0,0,0.12) 15% 16%, rgba(170,170,170,0.05) 17% 18%, rgba(0,0,0,0.12) 23% 24%,
          rgba(187,187,187,0.05) 25% 26%, rgba(0,0,0,0.12) 31% 33%,
          rgba(0,0,0,0.12) 34% 34.5%, rgba(187,187,187,0.05) 36% 40%,
          rgba(0,0,0,0.12) 41% 41.5%, rgba(187,187,187,0.05) 44% 45%,
          rgba(187,187,187,0.05) 46% 47%, rgba(0,0,0,0.12) 48% 49%, rgba(0,0,0,0.12) 50% 50.5%,
          rgba(0,0,0,0.12) 56% 56.5%, rgba(187,187,187,0.05) 57% 63%, rgba(0,0,0,0.12) 67% 69%,
          rgba(187,187,187,0.05) 69.5% 70%, rgba(0,0,0,0.12) 73.5% 74%,
          rgba(187,187,187,0.05) 74.5% 79%, rgba(0,0,0,0.12) 80% 84%,
          rgba(170,170,170,0.05) 85% 86%, rgba(0,0,0,0.12) 87%, rgba(187,187,187,0.03) 90%
        ) left center / 100vw 100vh no-repeat fixed;
    }

    .aero-window-body{
      margin:6px;
      margin-top:0;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(24,28,33,.92);
      box-shadow:0 0 0 1px rgba(255,255,255,.03);
      padding:12px;
      border-radius:0;
      min-height:calc(100vh - 12px);
    }

    .controls{
      display:grid;
      grid-template-columns:minmax(220px, 1.2fr) auto minmax(200px, .85fr);
      gap:10px;
      align-items:center;
      margin-bottom:12px;
    }

    .controls.search-active{
      grid-template-columns:minmax(260px, 1.8fr) auto minmax(70px, .25fr);
    }

    .searchbox,
    .centerbox,
    .sortwrap{
      position:relative;
      transition:transform .28s ease, opacity .28s ease, width .28s ease, max-width .28s ease;
    }

    .searchbox{
      width:min(100%, 280px);
      justify-self:start;
      transition:width .28s ease;
    }

    .searchbox.expanded{
      width:100%;
    }

    .searchbox i,
    .sortwrap i{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      left:12px;
      color:var(--muted);
      pointer-events:none;
      font-size:13px;
      z-index:2;
    }

    input,button{
      font-family:"Poppins", sans-serif;
    }

    input{
      width:100%;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(34,39,46,.98), rgba(25,29,35,.98));
      color:var(--text);
      outline:none;
      border-radius:14px;
      padding:12px 12px 12px 36px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 1px 0 rgba(0,0,0,.18);
      font-weight:700;
      transition:padding .28s ease, border-radius .28s ease, transform .28s ease;
    }

    input::placeholder{
      color:#93a0ad;
      font-weight:600;
    }

    .centerbox{
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .categorybtn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at bottom, rgba(255,255,255,.10), transparent 60%),
        linear-gradient(to bottom, #2f363f, #232930);
      color:#e9eef4;
      border-radius:999px;
      padding:11px 16px;
      cursor:pointer;
      font-weight:800;
      transition:all .28s ease;
      box-shadow:0 3px 4px rgba(0,0,0,.18);
      white-space:nowrap;
      max-width:100%;
      overflow:hidden;
    }

    .categorybtn .btn-text{
      display:inline-block;
      max-width:180px;
      overflow:hidden;
      white-space:nowrap;
      opacity:1;
      transform:translateX(0);
      transition:opacity .2s ease, max-width .28s ease, transform .28s ease;
    }

    .categorybtn.compact{
      padding:11px 12px;
      min-width:46px;
      justify-content:center;
    }

    .categorybtn.compact .btn-text{
      max-width:0;
      opacity:0;
      transform:translateX(8px);
    }

    .categorybtn:hover{
      transform:translateY(-1px);
    }

    .sortwrap{
      justify-self:end;
      width:100%;
      max-width:280px;
      overflow:hidden;
    }

    .sortbtn{
      width:100%;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(34,39,46,.98), rgba(25,29,35,.98));
      color:var(--text);
      outline:none;
      border-radius:14px;
      padding:12px 12px 12px 36px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 1px 0 rgba(0,0,0,.18);
      font-weight:800;
      cursor:pointer;
      text-align:left;
      position:relative;
      transition:all .28s ease;
      overflow:hidden;
    }

    .sortbtn .btn-text{
      display:inline-block;
      max-width:180px;
      overflow:hidden;
      white-space:nowrap;
      opacity:1;
      transform:translateX(0);
      transition:opacity .2s ease, max-width .28s ease, transform .28s ease;
    }

    .sortbtn.compact{
      padding:12px;
      min-width:46px;
      width:46px;
      justify-content:center;
      text-align:center;
    }

    .sortbtn.compact .btn-text{
      max-width:0;
      opacity:0;
      transform:translateX(8px);
    }

    .sortbtn::after{
      content:"\f107";
      font-family:"Font Awesome 6 Free";
      font-weight:900;
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      color:var(--muted);
      pointer-events:none;
      font-size:12px;
      transition:opacity .2s ease;
    }

    .sortbtn.compact::after{
      opacity:0;
    }

    .sortbtn.compact i{
      right:auto;
    }

    .tag-row-wrap{
      margin:8px 0 14px;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:nowrap;
    }

    .tag-scroll{
      flex:1;
      overflow-x:auto;
      overflow-y:hidden;
      display:flex;
      gap:8px;
      padding-bottom:8px;
      scrollbar-width:thin;
      scrollbar-color:rgba(122,136,152,.6) rgba(255,255,255,.08);
      scroll-snap-type:x proximity;
    }

    .tag-scroll::-webkit-scrollbar{
      height:10px;
    }

    .tag-scroll::-webkit-scrollbar-track{
      background:rgba(255,255,255,.08);
      border-radius:999px;
    }

    .tag-scroll::-webkit-scrollbar-thumb{
      background:rgba(122,136,152,.6);
      border-radius:999px;
    }

    .tagchip{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at bottom, rgba(255,255,255,.10), transparent 60%),
        linear-gradient(to bottom, #2f363f, #232930);
      color:#e9eef4;
      border-radius:999px;
      padding:9px 12px;
      cursor:pointer;
      transition:all 240ms ease;
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
      box-shadow:0 3px 4px rgba(0,0,0,.18);
      scroll-snap-align:start;
    }

    .tagchip:hover{
      transform:translateY(-1px);
    }

    .tagchip.active{
      background:
        radial-gradient(circle at bottom, rgba(255,255,255,.12), transparent 60%),
        linear-gradient(to bottom, #3b7fa8, #24536d);
      color:#ffffff;
      border-color:rgba(82,164,208,.35);
    }

    .meta-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:6px 2px 14px;
      color:var(--muted);
      font-size:13px;
      flex-wrap:wrap;
      font-weight:700;
    }

    .grid{
      display:grid;
      gap:12px;
    }

    .post-link{
      display:block;
      color:inherit;
      text-decoration:none;
    }

    .card{
      display:grid;
      grid-template-columns:clamp(110px, 24vw, 160px) 1fr;
      gap:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
      min-height:140px;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease;
    }

    .card:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }

    .thumb{
      width:100%;
      height:100%;
      min-height:140px;
      max-height:220px;
      object-fit:cover;
      background:#2b3138;
      display:block;
    }

    .content{
      padding:14px 14px 12px 0;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:10px;
    }

    .title{
      font-size:16px;
      line-height:1.25;
      margin:0 0 6px;
      font-weight:800;
      color:#eef3f7;
    }

    .desc{
      color:#b5c0cb;
      font-size:13px;
      line-height:1.5;
      margin:0;
      font-weight:600;
    }

    .postmeta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      color:#aab4bf;
      font-size:12px;
      font-weight:700;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      padding:6px 10px;
      border-radius:999px;
    }

    .empty,.endmsg{
      text-align:center;
      padding:18px 10px;
      color:#aab4bf;
      font-weight:700;
    }

    .endmsg{
      display:none;
      margin-top:8px;
    }

    .tagmodal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:100;
      padding:16px;
      backdrop-filter:blur(4px);
    }

    .tagmodal.show{
      display:flex;
    }

    .tagmodal-box{
      width:min(720px, 100%);
      background:rgba(23,27,32,.96);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      box-shadow:0 24px 60px rgba(0,0,0,.5);
      overflow:hidden;
    }

    .tagmodal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 16px 12px;
      border-bottom:1px dashed rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }

    .tagmodal-head h2{
      margin:0;
      font-size:16px;
      font-weight:800;
      color:var(--text);
    }

    .closebtn{
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, #2f363f, #232930);
      color:#eef3f7;
      border-radius:12px;
      width:40px;
      height:40px;
      cursor:pointer;
      box-shadow:0 2px 4px rgba(0,0,0,.08);
    }

    .taglist{
      padding:16px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      max-height:60vh;
      overflow:auto;
    }

    .tagitem{
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at bottom, rgba(255,255,255,.08), transparent 60%),
        linear-gradient(to bottom, #2f3740, #242a31);
      color:#e9eef4;
      border-radius:999px;
      padding:10px 14px;
      cursor:pointer;
      transition:all 240ms ease;
      user-select:none;
      font-weight:800;
    }

    .tagitem:hover{
      transform:translateY(-1px);
    }

    .tagitem.active{
      background:
        radial-gradient(circle at bottom, rgba(255,255,255,.08), transparent 60%),
        linear-gradient(to bottom, #3b7fa8, #24536d);
      color:#ffffff;
    }

    .selectedtagline{
      margin-top:12px;
      color:#aab4bf;
      font-size:13px;
      font-weight:700;
    }

    .selectedtagname{
      color:#eef3f7;
      font-weight:800;
    }

    .yt-footer{
      margin-top:34px;
      padding:20px 0 0;
      text-align:center;
      border-top:1px dashed rgba(255,255,255,.10);
    }

    .yt-btn{
      display:inline-flex;
      align-items:center;
      gap:12px;
      padding:11px 18px;
      border-radius:9999px;
      border:1px solid rgba(255,255,255,.10);
      color:#e9eef4;
      text-decoration:none;
      font-weight:800;
      font-size:13px;
      line-height:1;
      transition:all 300ms ease;
      cursor:pointer;
      min-height:42px;
      box-shadow:0 4px 4px rgba(0,0,0,.16);
      position:relative;
      user-select:none;
      -webkit-user-select:none;
      background:
        radial-gradient(farthest-corner at bottom center, rgba(255,255,255,.12), transparent),
        linear-gradient(to bottom, #2f7bc0, #245f95);
    }

    .yt-btn::after{
      content:"";
      position:absolute;
      top:4%;
      left:.75em;
      width:calc(100% - 1.5em);
      height:40%;
      background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.05));
      border-radius:inherit;
      pointer-events:none;
    }

    .yt-btn:hover,
    .yt-btn:focus{
      box-shadow:0 6px 8px rgba(0,0,0,.2);
      transform:translateY(-1px);
    }

    .yt-btn:active{
      box-shadow:0 2px 4px rgba(0,0,0,.2);
      transform:translateY(1px);
    }

    .yt-btn .btn-icon{
      width:24px;
      height:24px;
      min-width:24px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.08);
      flex:0 0 auto;
      position:relative;
      z-index:1;
    }

    .yt-btn .btn-icon i{
      font-size:11px;
    }

    .footer-filter{
      margin-top:16px;
      display:none;
      justify-content:center;
    }

    .footer-filter.show{
      display:flex;
    }

    .readmore-wrap{
      margin-top:8px;
      display:flex;
      justify-content:flex-start;
    }

    .readmore{
      display:inline-flex;
      width:auto;
      padding:9px 14px;
      min-height:38px;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:12.5px;
    }

    @media (max-width:920px){
      .controls{
        grid-template-columns:1fr;
        gap:8px;
      }

      .searchbox{
        width:100%;
        max-width:none;
      }

      .controls.search-active{
        grid-template-columns:1fr;
      }

      .centerbox,
      .sortwrap{
        width:100%;
        max-width:none;
        justify-self:stretch;
      }

      .categorybtn,
      .sortbtn{
        width:100%;
      }

      .categorybtn.compact,
      .sortbtn.compact{
        width:100%;
        min-width:0;
      }

      .categorybtn.compact .btn-text,
      .sortbtn.compact .btn-text{
        max-width:180px;
        opacity:1;
        transform:none;
      }

      .tag-row-wrap{
        flex-wrap:wrap;
      }

      .tag-scroll{
        width:100%;
        order:1;
      }

      .card{
        grid-template-columns:1fr;
      }

      .thumb{
        min-height:160px;
        max-height:220px;
      }

      .content{
        padding:0 14px 14px;
      }

      .yt-btn{
        width:100%;
      }
    }

    @media (max-width:520px){
      .thumb{
        min-height:140px;
        max-height:180px;
      }
    }
  </style>
</head>
<body>
  <div class="aero-window">
    <div class="aero-title-bar"></div>
    <div class="aero-window-body">
      <div class="controls" id="controlsBar">
        <div class="searchbox" id="searchBox">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="searchInput" type="text" placeholder="Cari postingan..." autocomplete="off">
        </div>

        <div class="centerbox">
          <button class="categorybtn" type="button" id="openAllTagsBtn" aria-label="Lihat semua kategori">
            <i class="fa-solid fa-list"></i>
            <span class="btn-text">Lihat semua kategori</span>
          </button>
        </div>

        <div class="sortwrap">
          <i class="fa-solid fa-arrow-down-wide-short"></i>
          <button id="sortBtn" class="sortbtn" type="button">
            <span class="btn-text">Urut: Terbaru</span>
          </button>
        </div>
      </div>

      <div class="tag-row-wrap">
        <div class="tag-scroll" id="tagPreview"></div>
      </div>

      <div class="meta-row">
        <div id="statusText">Memuat data...</div>
        <div id="countText"></div>
      </div>

      <div class="grid" id="news"></div>

      <div class="endmsg" id="endMsg">
        <i class="fa-solid fa-box-open"></i> Kamu sudah sampai akhir postingan
      </div>

      <div class="yt-footer">
        <div class="footer-filter" id="footerFilterWrap">
          <button class="yt-btn" id="clearFilterBtn" type="button">
            <span class="btn-icon"><i class="fa-solid fa-filter-circle-xmark"></i></span>
            Matikan filter
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="tagmodal" id="tagModal" aria-hidden="true">
    <div class="tagmodal-box" role="dialog" aria-modal="true">
      <div class="tagmodal-head">
        <h2>Kategori lainnya</h2>
        <button class="closebtn" id="closeTagModal" type="button" aria-label="Tutup">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="taglist" id="tagList"></div>
      <div class="selectedtagline" style="padding:0 16px 16px;">
        Filter aktif: <span class="selectedtagname" id="selectedTagText">Semua</span>
      </div>
    </div>
  </div>

  <script>
    const BLOG = "https://ahmadrijaniofficial.blogspot.com/feeds/posts/default?alt=json-in-script&max-results=500&callback=handleFeed";
    const STEP = 6;

    let allPosts = [];
    let filteredPosts = [];
    let visibleStart = 0;
    let visibleCount = STEP;
    let activeTag = "all";
    let activeSort = "newest";
    let searchQuery = "";
    let loading = false;
    let endReached = false;

    const els = {
      controlsBar: document.getElementById("controlsBar"),
      searchBox: document.getElementById("searchBox"),
      searchInput: document.getElementById("searchInput"),
      sortBtn: document.getElementById("sortBtn"),
      news: document.getElementById("news"),
      endMsg: document.getElementById("endMsg"),
      statusText: document.getElementById("statusText"),
      countText: document.getElementById("countText"),
      tagModal: document.getElementById("tagModal"),
      tagList: document.getElementById("tagList"),
      openAllTagsBtn: document.getElementById("openAllTagsBtn"),
      closeTagModal: document.getElementById("closeTagModal"),
      clearFilterBtn: document.getElementById("clearFilterBtn"),
      footerFilterWrap: document.getElementById("footerFilterWrap"),
      selectedTagText: document.getElementById("selectedTagText"),
      tagPreview: document.getElementById("tagPreview"),
      categoryBtn: document.querySelector(".categorybtn"),
      sortBtnInner: document.querySelector("#sortBtn .btn-text"),
      categoryBtnInner: document.querySelector(".categorybtn .btn-text"),
    };

    function escapeHtml(str){
      return String(str || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function getTextFromHtml(html){
      const temp = document.createElement("div");
      temp.innerHTML = html || "";
      return (temp.textContent || temp.innerText || "").replace(/\s+/g, " ").trim();
    }

    function getThumb(html){
      const match = String(html || "").match(/<img[^>]+src="([^">]+)"/i);
      return match ? match[1] : "https://via.placeholder.com/800x450?text=No+Image";
    }

    function getTags(entry){
      return (entry.category || []).map(c => c.term).filter(Boolean);
    }

    function getPostLink(entry){
      let link = "#";
      (entry.link || []).forEach(l => {
        if (l.rel === "alternate") link = l.href;
      });
      return link;
    }

    function formatDate(d){
      return new Date(d).toLocaleDateString("id-ID", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function getAllTags(){
      const set = new Set();
      allPosts.forEach(p => getTags(p).forEach(t => set.add(t)));
      return Array.from(set).sort((a, b) => a.localeCompare(b, "id"));
    }

    function renderTagPreview(){
      const tags = getAllTags();
      let html = "";

      html += `<button class="tagchip ${activeTag === "all" ? "active" : ""}" type="button" data-tag="all">Semua</button>`;

      tags.forEach(tag => {
        const active = activeTag === tag ? "active" : "";
        html += `<button class="tagchip ${active}" type="button" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`;
      });

      els.tagPreview.innerHTML = html;

      els.tagPreview.querySelectorAll(".tagchip").forEach(item => {
        item.addEventListener("click", () => {
          setTag(item.getAttribute("data-tag") || "all");
        });
      });
    }

    function renderTagModal(){
      const tags = getAllTags();
      let html = `
        <div class="tagitem ${activeTag === "all" ? "active" : ""}" data-tag="all">
          <i class="fa-solid fa-layer-group"></i> Semua
        </div>
      `;

      tags.forEach(tag => {
        const active = activeTag === tag ? "active" : "";
        html += `
          <div class="tagitem ${active}" data-tag="${escapeHtml(tag)}">
            ${escapeHtml(tag)}
          </div>
        `;
      });

      els.tagList.innerHTML = html;

      els.tagList.querySelectorAll(".tagitem").forEach(item => {
        item.addEventListener("click", () => {
          setTag(item.getAttribute("data-tag") || "all");
          closeTagModal();
        });
      });
    }

    function updateTagUI(){
      els.selectedTagText.textContent = activeTag === "all" ? "Semua" : activeTag;
      els.footerFilterWrap.classList.toggle("show", activeTag !== "all");
      renderTagPreview();
      renderTagModal();
    }

    function updateSortButton(){
      els.sortBtnInner.textContent = activeSort === "newest" ? "Urut: Terbaru" : "Urut: Terlama";
    }

    function toggleSort(){
      activeSort = activeSort === "newest" ? "oldest" : "newest";
      updateSortButton();
      applyFilters();
    }

    function applyFilters(){
      const q = searchQuery.toLowerCase().trim();

      filteredPosts = allPosts.filter(p => {
        const title = (p.title?.$t || "").toLowerCase();
        const text = getTextFromHtml(p.content?.$t || "").toLowerCase();
        const tags = getTags(p);

        const matchSearch = !q || title.includes(q) || text.includes(q) || tags.some(t => t.toLowerCase().includes(q));
        const matchTag = activeTag === "all" || tags.includes(activeTag);

        return matchSearch && matchTag;
      });

      sortFiltered();
      visibleStart = 0;
      visibleCount = STEP;
      endReached = false;
      els.news.innerHTML = "";
      updateMeta();
      renderMore(true);
    }

    function sortFiltered(){
      const sortMode = activeSort;
      filteredPosts.sort((a, b) => {
        const da = new Date(a.published?.$t || 0);
        const db = new Date(b.published?.$t || 0);
        return sortMode === "oldest" ? da - db : db - da;
      });
    }

    function updateMeta(){
      els.countText.textContent = `${filteredPosts.length} postingan`;
      els.statusText.textContent =
        activeTag === "all"
          ? "Menampilkan semua postingan"
          : `Filter kategori: ${activeTag}`;
    }

    function bukaLinkKeluar(url){
      try {
        if (window.top && window.top !== window.self) {
          window.top.location.href = url;
        } else {
          window.location.href = url;
        }
      } catch (e) {
        window.location.href = url;
      }
      return false;
    }

    function renderCard(post){
      const title = escapeHtml(post.title?.$t || "Tanpa judul");
      const rawHtml = post.content?.$t || post.summary?.$t || "";
      const descText = getTextFromHtml(rawHtml).substring(0, 140);
      const desc = escapeHtml(descText);
      const thumb = getThumb(rawHtml);
      const date = formatDate(post.published?.$t || new Date().toISOString());
      const link = getPostLink(post);
      const tags = getTags(post);
      const tagsToShow = tags.slice(0, 2);

      return `
        <a class="post-link" href="${link}" target="_top" rel="noopener noreferrer" aria-label="Buka ${title}" onclick="return bukaLinkKeluar(this.href);">
          <article class="card">
            <img class="thumb" src="${thumb}" alt="${title}">
            <div class="content">
              <div>
                <h2 class="title">${title}</h2>
                <p class="desc">${desc}${desc.length >= 140 ? "..." : ""}</p>
              </div>

              <div class="postmeta">
                <span class="chip"><i class="fa-regular fa-calendar"></i> ${date}</span>
                ${tagsToShow.map(t => `<span class="chip"><i class="fa-solid fa-tag"></i> ${escapeHtml(t)}</span>`).join("")}
              </div>

              <div class="readmore-wrap">
                <span class="yt-btn readmore">
                  <span class="btn-icon"><i class="fa-solid fa-arrow-right"></i></span>
                  Baca selengkapnya
                </span>
              </div>
            </div>
          </article>
        </a>
      `;
    }

    function renderMore(fromReset = false){
      if (loading) return;
      if (visibleStart >= filteredPosts.length){
        endReached = true;
        els.endMsg.style.display = "block";
        return;
      }

      loading = true;
      els.endMsg.style.display = "none";

      const end = Math.min(visibleStart + visibleCount, filteredPosts.length);
      const chunk = filteredPosts.slice(visibleStart, end).map(renderCard).join("");

      if (fromReset){
        els.news.innerHTML = chunk;
      } else {
        els.news.insertAdjacentHTML("beforeend", chunk);
      }

      visibleStart = end;
      endReached = visibleStart >= filteredPosts.length;
      loading = false;

      if (endReached){
        els.endMsg.style.display = "block";
      }
    }

    function setTag(tag){
      activeTag = tag;
      updateTagUI();
      applyFilters();
    }

    function openTagModal(){
      renderTagModal();
      els.tagModal.classList.add("show");
      els.tagModal.setAttribute("aria-hidden", "false");
    }

    function closeTagModal(){
      els.tagModal.classList.remove("show");
      els.tagModal.setAttribute("aria-hidden", "true");
    }

    function setSearchActive(active){
      els.controlsBar.classList.toggle("search-active", active);
      els.searchBox.classList.toggle("expanded", active);

      els.categoryBtn.classList.toggle("compact", active);
      els.sortBtn.classList.toggle("compact", active);

      const showIconsOnly = active;
      if (showIconsOnly){
        els.categoryBtn.setAttribute("aria-label", "Lihat semua kategori");
        els.sortBtn.setAttribute("aria-label", activeSort === "newest" ? "Urut terbaru" : "Urut terlama");
      }
    }

    function isNearBottom(){
      return window.innerHeight + window.scrollY >= document.body.offsetHeight - 240;
    }

    window.addEventListener("scroll", () => {
      if (loading || endReached) return;
      if (isNearBottom()){
        renderMore(false);
      }
    });

    els.searchInput.addEventListener("focus", () => {
      setSearchActive(true);
    });

    els.searchInput.addEventListener("blur", () => {
      if (!els.searchInput.value.trim()){
        setSearchActive(false);
      }
    });

    els.searchInput.addEventListener("input", (e) => {
      searchQuery = e.target.value || "";
      setSearchActive(!!searchQuery.trim() || document.activeElement === els.searchInput);
      applyFilters();
    });

    els.sortBtn.addEventListener("click", toggleSort);

    els.openAllTagsBtn.addEventListener("click", openTagModal);
    els.closeTagModal.addEventListener("click", closeTagModal);

    els.tagModal.addEventListener("click", (e) => {
      if (e.target === els.tagModal) closeTagModal();
    });

    els.clearFilterBtn.addEventListener("click", () => {
      setTag("all");
      closeTagModal();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeTagModal();
    });

    function handleFeed(data){
      try{
        allPosts = data.feed?.entry || [];
        updateSortButton();
        updateTagUI();
        applyFilters();
      }catch(err){
        els.statusText.textContent = "Gagal memproses feed";
        els.news.innerHTML = `<div class="empty">Data feed ada, tapi formatnya tidak bisa diproses.</div>`;
        els.endMsg.style.display = "none";
        console.error(err);
      }
    }

    window.handleFeed = handleFeed;
    window.bukaLinkKeluar = bukaLinkKeluar;

    function loadJsonp(){
      const old = document.getElementById("blogFeedScript");
      if (old) old.remove();

      const s = document.createElement("script");
      s.id = "blogFeedScript";
      s.src = BLOG;
      s.onerror = function(){
        els.statusText.textContent = "Gagal memuat feed";
        els.news.innerHTML = `<div class="empty">Feed gagal dibaca. Pastikan blog publik dan feed aktif.</div>`;
        els.endMsg.style.display = "none";
      };
      document.body.appendChild(s);
    }

    loadJsonp();
  </script>
</body>
</html>
